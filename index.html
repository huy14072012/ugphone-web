<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UgPhone Hub - Cày Coin Đổi Tài Khoản</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0f19; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; background: #1f2937; padding: 30px; border-radius: 12px; border: 1px solid #374151; text-align: center; }
        h1 { color: #fff; margin-bottom: 20px; font-size: 26px; }
        p { color: #94a3b8; margin-bottom: 20px; }
        .wallet-box { background: #111827; border: 1px dashed #10b981; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-size: 18px; }
        .coin-amount { color: #10b981; font-weight: bold; font-size: 24px; }
        .btn-link { display: block; background: linear-gradient(135deg, #f43f5e, #e11d48); color: white; text-decoration: none; font-weight: bold; padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 16px; }
        .shop-box { background: #111827; padding: 20px; border-radius: 8px; border: 1px solid #4b5563; text-align: left; margin-top: 25px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #374151; }
        .btn-buy { background: #10b981; color: white; padding: 8px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-buy:hover { background: #059669; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hệ Thống Đổi ACC UgPhone Tự Động</h1>
        
        <div class="wallet-box">
            Ví Coin Trên Thiết Bị: <span id="user-coin" class="coin-amount">0</span> COIN
        </div>

        <p style="color: #cbd5e1;">Cày thêm Coin bằng cách vượt link tài trợ dưới đây:</p>
        
        <a href="https://yeulink.com/link-rut-gon-cua-ban" target="_blank" class="btn-link">🚀 Vượt Link Kiếm Coin (+6 COIN)</a>
        
        <div class="shop-box">
            <h3 style="color: #fff; margin-bottom: 10px; border-bottom: 2px solid #3b82f6; padding-bottom: 5px;">🛒 Cửa Hàng Đổi ACC</h3>
            <div class="shop-item">
                <div>
                    <strong>Gói UgPhone Treo Game (1 Ngày)</strong><br>
                    <span style="color: #94a3b8; font-size: 13px;">Giá bán: 2 Coin / lượt đổi</span>
                </div>
                <button onclick="buyUgPhone()" class="btn-buy">Đổi Ngay</button>
            </div>
        </div>
    </div>

    <script>
        // Hàm tự động load và hiển thị coin chuẩn xác
        function loadCoin() {
            let myCoin = localStorage.getItem('guest_coin');
            if (myCoin === null) {
                localStorage.setItem('guest_coin', '0');
                myCoin = '0';
            }
            document.getElementById('user-coin').innerText = myCoin;
        }

        window.onload = loadCoin;
        // Chạy liên tục để cập nhật nếu có thay đổi trang
        setInterval(loadCoin, 1000);

        function buyUgPhone() {
            let coin = parseInt(localStorage.getItem('guest_coin') || '0');

            if (coin < 2) {
                alert("Bạn không đủ Coin! Cần 2 Coin để đổi gói, hãy bấm vượt link để kiếm thêm.");
                return;
            }

            // Trừ 2 coin của khách
            coin -= 2;
            localStorage.setItem('guest_coin', coin.toString());
            document.getElementById('user-coin').innerText = coin;

            // KHO TÀI KHOẢN UGPHONE THẬT: Bạn điền các acc của bạn vào đây nhé
            const listAcc = [
                "TK: huyugphone1 | MK: huy123",
                "TK: accugphone2 | MK: vip999",
                "TK: cloneug3 | MK: gamepro"
            ];
            const randomAcc = listAcc[Math.floor(Math.random() * listAcc.length)];
            
            // Lưu tài khoản vừa quay được vào bộ nhớ tạm để trang hiển thị đọc được
            localStorage.setItem('last_purchased_acc', randomAcc);

            // CHUYỂN HƯỚNG SANG TRANG HIỂN THỊ TÀI KHOẢN RIÊNG
            window.location.href = "giu-tai-khoan.html";
        }
    </script>
</body>
</html>
