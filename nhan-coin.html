<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Nhận Cộng Coin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0f19; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 550px; margin: 80px auto; background: #111827; padding: 40px; border-radius: 16px; border: 2px solid #10b981; text-align: center; }
        .icon-success { font-size: 60px; color: #10b981; margin-bottom: 20px; }
        h1 { color: #fff; margin-bottom: 15px; font-size: 26px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .btn-claim { display: inline-block; background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 16px 40px; border-radius: 50px; font-weight: bold; font-size: 18px; border: none; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-success">💰</div>
        <h1>Vượt Link Thành Công!</h1>
        <p id="msg">Hãy bấm vào nút bên dưới để nạp thêm +6 Coin vào thiết bị của bạn.</p>
        <button id="claim-btn" onclick="claim6Coin()" class="btn-claim">🎁 Nhận +6 Coin Ngay</button>
    </div>

    <script>
        const lastClaimTime = localStorage.getItem('last_time_click_claim');
        const currentTime = new Date().getTime();

        window.onload = function() {
            if (lastClaimTime && (currentTime - lastClaimTime < 36000000)) {
                const hoursLeft = Math.ceil((36000000 - (currentTime - lastClaimTime)) / (1000 * 60 * 60));
                document.getElementById('msg').innerText = "Thiết bị của bạn vừa mới nhận coin rồi! Vui lòng chờ " + hoursLeft + " tiếng nữa.";
                document.getElementById('claim-btn').style.display = "none";
            }
        }

        function claim6Coin() {
            let currentCoin = parseInt(localStorage.getItem('guest_coin') || '0');
            currentCoin += 6;
            localStorage.setItem('guest_coin', currentCoin.toString());
            localStorage.setItem('last_time_click_claim', new Date().getTime());

            alert("Thành công! Đã cộng 6 Coin vào thiết bị của bạn.");
            
            // Dùng lệnh này để ép trình duyệt tải lại trang chủ kèm dữ liệu coin mới
            window.location.replace("./index.html");
        }
    </script>
</body>
</html>
