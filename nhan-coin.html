<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang xử lý cộng Coin...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0f19; color: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .loading-box { background: #1f2937; padding: 30px; border-radius: 12px; border: 1px solid #374151; max-width: 400px; width: 90%; }
        h2 { color: #10b981; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>

    <div class="loading-box">
        <h2>💰 Đang cộng +6 Coin...</h2>
        <p>Hệ thống đang xác thực lượt vượt link của bạn và tự động đưa bạn quay lại trang chủ sau 2 giây.</p>
    </div>

    <script>
        window.onload = function() {
            let currentCoin = parseInt(localStorage.getItem('guest_coin') || '0');
            currentCoin += 6; // Cộng 6 coin
            localStorage.setItem('guest_coin', currentCoin.toString());

            setTimeout(function() {
                window.location.href = "index.html";
            }, 2000);
        }
    </script>
</body>
</html>
