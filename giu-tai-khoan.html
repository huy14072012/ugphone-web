<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kích Hoạt Tài Khoản UgPhone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0f19; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 550px; margin: 80px auto; background: #111827; padding: 40px; border-radius: 16px; border: 2px solid #3b82f6; text-align: center; box-shadow: 0 0 30px rgba(59, 130, 246, 0.3); }
        h1 { color: #fff; margin-bottom: 15px; font-size: 26px; }
        p { color: #94a3b8; margin-bottom: 25px; }
        .btn-action { display: block; width: 100%; padding: 15px; margin-bottom: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        .btn-login { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .btn-login:hover { transform: translateY(-2px); }
        .btn-back { background: #374151; color: #cbd5e1; font-size: 15px; }
        .status-box { background: #1f2937; padding: 15px; border-radius: 6px; margin-bottom: 25px; color: #10b981; font-weight: bold; font-size: 15px; border: 1px dashed #3b82f6; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 Đổi Gói Thành Công!</h1>
        <p>Hệ thống đang thiết lập môi trường Cloud Phone cho bạn.</p>
        
        <div id="status" class="status-box">Đang xử lý nạp tài khoản ngầm...</div>
        
        <a href="https://www.ugphone.com/web-cloudphone/" target="_blank" class="btn-action btn-login">🚀 Vào Thẳng Máy Ảo UgPhone</a>
        <a href="./index.html" class="btn-action btn-back">⬅ Quay Lại Trang Chủ</a>
    </div>

    <script>
        window.onload = function() {
            const rawData = localStorage.getItem('last_purchased_acc');
            if (rawData) {
                try {
                    const accountObj = JSON.parse(rawData);
                    for (const key in accountObj) {
                        localStorage.setItem(key, accountObj[key]);
                    }
                    document.getElementById('status').innerText = "✔ Đã đồng bộ tài khoản thành công! Hãy ấn nút màu xanh để vào game.";
                    localStorage.removeItem('last_purchased_acc');
                } catch (e) {
                    document.getElementById('status').innerText = "❌ Lỗi cấu hình dữ liệu tài khoản!";
                    document.getElementById('status').style.color = "#ef4444";
                }
            } else {
                document.getElementById('status').innerText = "ℹ Tài khoản đã được nạp thành công trước đó.";
                document.getElementById('status').style.color = "#94a3b8";
            }
        }
    </script>
</body>
</html>
